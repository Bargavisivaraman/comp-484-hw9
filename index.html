<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Mini Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
        line-height: 1.6;
      }
      h1 {
        color: #333;
        border-bottom: 3px solid #4CAF50;
        padding-bottom: 10px;
      }
      h2 {
        color: #4CAF50;
        margin-top: 30px;
      }
      h3 {
        color: #666;
      }
      p {
        margin: 10px 0;
      }
      #dateOutput, #numberConversionOutput, #mathOutput {
        background-color: #f4f4f4;
        padding: 15px;
        border-radius: 5px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h1>JavaScript Mini Demo</h1>

    <!-- Date Section -->
    <h2>Date Display</h2>
    <p id="dateOutput">Date will appear here</p>

    <!-- Number Conversion Section -->
    <h2>Number Conversion Tests</h2>
    <div id="numberConversionOutput">Results will appear here</div>

    <!-- Math and Formatting Section -->
    <h2>Math and Number Formatting</h2>
    <div id="mathOutput">Results will appear here</div>

    <!-- Link to external JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
